<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles-login/csslogin.css">
    <link href="https://fonts.googleapis.com/css2?family=Kufam:wght@400&display=swap" rel="stylesheet">
    <title>Ecovoix</title>
</head>
<body>
    <div class="logo">
        <img class="img_logo" src="img/logo.svg" alt="Logo">
    </div>  
    <div class="Nome_projeto">EcoKeeds</div>
    <div class="sbv">Seja bem-vindo(a)!</div>
    <div class="rlogin">Realize seu login abaixo:</div>
    <br>
    <br>
        <input class="Login_container" placeholder="Usuário" type="text" name="Login" id="login">
        <br>
        <br>
        <input class="Senha_container" placeholder="Senha" type="password" name="Senha" id="senha">
        <br>
    <div class="checkbox">
        <input type="checkbox" id="remember-me" name="remember-me">
        <label for="remember-me" style="vertical-align: middle;">Manter-me conectado</label>
    </div>

    <div class="entrar">
        <button class="bt_entrar">Login</button>
        <br>
        <button class="bt_esqueci-senha">Esqueci minha senha</button>
        <br>
        <button class="bt_cadastrar">Cadastrar-se</button>
    </div>
</body>
</html>
